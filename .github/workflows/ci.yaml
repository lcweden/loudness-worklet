name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run -w @loudness-worklet/lib test 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}